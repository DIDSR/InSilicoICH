# This is an example distribution file for PedSilicoICH simulations
# All parameters are given as a list which is sampled from in the `recruit` program
#
# uncommented parameters here will override defaults
[general]
OutputDirectory="default_study"
ScanCoverage=[0, 10]  # scan range in mm, min max, comment out to scan whole range
StudyCount=3  # desired dataset size
RemoveRawData=true  # keep projection data
Seed=false  # seed to reproduce dataset, set to false or integer

[patient]
Age=[0, 100]  # range in yrs [min, max]

[lesion]
Subtype=['IPH', 'SDH', 'EDH'] # add [false] for hemorrhage-absent cases
MassEffect=true  # whether lesions displace brain tissue
Edema=[0, 15]  # edema width range [min, max] in pixels
LesionVolume='src/insilicoICH/distributions/BHSD_volume_distributions.csv'  # str or list
LesionAttenuation='src/insilicoICH/distributions/BHSD_HU_distributions.csv'  # str or list

[acquisition]
ScannerModel=['GE_Lightspeed16','Scanner_Default']
Views=[100]
kVp=[120]  # Tube potential: The electric potential applied across an x-ray tube to accelerate electrons towards a target material, expressed in units of kilovolts (kV) 
mA=[200]  # Tube current: Number of electrons accelerated across an x-ray tube per unit time, expressed in units of milliampere (mA)
Pitch=[0.5]  # pitch = 0 for axial model, pitch > 0 for helical, recommend pitch < 0.6 for head
#  Unitless parameter used to describe the table travel during helical CT; equal to table travel (mm) per gantry rotation ÷ total nominal beam width (mm) 

[recon]
ReconKernel=['standard']  # Reconstruction property that determines sharpness or smoothness of image in the axial plane 
SliceThickness=[1]  # Nominal width of reconstructed image along the z axis 
SliceIncrement=[1]  # Distance between adjacent slices in the z axis, should be equal to or greater than slice thickness