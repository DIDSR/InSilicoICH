# This is an example configuration for PedSilicoICH simulations
# uncommented parameters here will override defaults
[general]
output_directory="test"
#zspan=[0, 10]  # scan range in mm, min max
desired_cases=20  # desired dataset size
keep_raw=false  # keep projection data
# seed=false  # seed to reproduce dataset

[patient]
age=[38]  # range in yrs [min, max]

[lesion]
subtypes=[false, 'round', 'epidural', 'subdural']
mass_effect=true  # whether lesions displace brain tissue
edema=[0, 15]  # edema width range [min, max] in pixels
volume='src/pedsilicoICH/distributions/BHSD_volume_distributions.csv'  # str or list
attenuation='src/pedsilicoICH/distributions/BHSD_HU_distributions.csv'  # str or list

[acquisition]
views=50
kVp=[120]
mA=[300, 350, 400]

[recon]
kernel='soft'
slice_thickness=1